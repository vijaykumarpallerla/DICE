<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Job Scraper Dashboard</title>
    <style>
        :root {
            --bg-color: #0b2a38;
            /* Dice Dark Blue */
            --card-bg: #113647;
            --text-main: #ffffff;
            --text-muted: #a1b8c4;
            --accent-cyan: #00b5c8;
            /* Dice Cyan Highlight */
            --accent-red: #cc292b;
            /* Dice Red */
            --border-radius: 8px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            background-color: #08212c;
            padding: 20px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--card-bg);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-box {
            background-color: var(--accent-red);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-style: italic;
            font-weight: 900;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #08212c, var(--bg-color));
            border-bottom: 1px solid var(--card-bg);
        }

        .hero h1 {
            font-size: 36px;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .hero h1 span {
            color: var(--accent-cyan);
        }

        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-container label {
            font-size: 14px;
            color: var(--accent-cyan);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .search-container input {
            padding: 15px 20px;
            border-radius: 30px;
            border: 2px solid var(--card-bg);
            background-color: var(--card-bg);
            color: var(--text-main);
            width: 100%;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .search-container input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 4px 15px rgba(0, 181, 200, 0.2);
        }

        .btn-action {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        
        .btn-action:hover {
            opacity: 0.8;
        }
        
        .btn-save {
            background-color: var(--accent-cyan);
            color: var(--bg-color);
        }
        
        .btn-cancel {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--text-muted);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .stats {
            margin-bottom: 20px;
            font-size: 18px;
            color: var(--text-muted);
        }

        .stats span {
            color: var(--accent-cyan);
            font-weight: bold;
        }

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .job-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid var(--accent-cyan);
        }

        .job-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .job-title {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .job-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .badge {
            background-color: rgba(0, 181, 200, 0.1);
            color: var(--accent-cyan);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
        }

        .job-desc {
            font-size: 13px;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 4;
            line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .job-actions {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }

        .btn-connect {
            background-color: var(--text-main);
            color: var(--bg-color);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-connect:hover {
            background-color: var(--accent-cyan);
            color: white;
        }

        .btn-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            padding: 8px;
        }

        .btn-link:hover {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header style="display: flex; justify-content: space-between; align-items: center; width: 100%; box-sizing: border-box;">
        <div style="flex: 1;"></div>
        <div class="logo">
            <div class="logo-box">Dice</div>
            Scraper Dashboard
        </div>
        <div style="flex: 1; display: flex; justify-content: flex-end;">
            <a href="/logout" style="text-decoration: none;">
                <button type="button" class="btn-action btn-cancel" style="border-color: var(--accent-red); color: var(--accent-red); margin-right: 20px;">Logout</button>
            </a>
        </div>
    </header>

    <div class="hero">
        <h1>Find Your Next <span>Contract</span> Role</h1>
        <div class="search-container">
            <label for="keywordSearch">Keywords to Search (Separated by ",")</label>
            <input type="text" id="keywordSearch" placeholder="e.g. React, Spring Boot, Remote" oninput="filterJobs()">

            <label for="destEmail" style="margin-top: 10px;">Destination Email</label>
            <input type="email" id="destEmail" placeholder="Enter email id">
            
            <div style="margin-top: 15px; display: flex; gap: 10px; width: 100%; justify-content: center;">
                <button type="button" id="saveBtn" class="btn-action btn-save">Save</button>
                <button type="button" id="cancelBtn" class="btn-action btn-cancel">Cancel</button>
            </div>
            
            <div style="margin-top: 15px; display: flex; gap: 10px; width: 100%; justify-content: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <button type="button" id="startScrapeBtn" class="btn-action" style="background-color: #34A853; color: white;">▶ Start Scraper</button>
                <button type="button" id="stopScrapeBtn" class="btn-action" style="background-color: var(--accent-red); color: white;">■ Stop Scraper</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats">Showing <span id="jobCount">0</span> Jobs</div>
        <div class="job-grid" id="jobGrid">
            <!-- Jobs will be injected here via JS -->
        </div>
    </div>

    <script>
        let allJobs = [];

        // Load saved settings from Backend
        window.onload = () => {
            fetch('/api/get_settings')
                .then(res => res.json())
                .then(data => {
                    if (data.savedKeywords) document.getElementById('keywordSearch').value = data.savedKeywords;
                    if (data.savedEmail) document.getElementById('destEmail').value = data.savedEmail;
                })
                .catch(err => console.error("Error loading settings:", err));
        };

        // Save Button Event
        document.getElementById('saveBtn').addEventListener('click', () => {
            const keywords = document.getElementById('keywordSearch').value;
            const email = document.getElementById('destEmail').value;
            
            fetch('/api/save_settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ savedKeywords: keywords, savedEmail: email })
            }).then(() => alert('Settings saved to Local App Data!'))
              .catch(err => console.error("Error saving settings:", err));
        });

        // Cancel Button Event
        document.getElementById('cancelBtn').addEventListener('click', () => {
            document.getElementById('keywordSearch').value = '';
            document.getElementById('destEmail').value = '';
            filterJobs();
        });

        // Scraper Control Events
        document.getElementById('startScrapeBtn').addEventListener('click', () => {
            fetch('/api/start_scrape', { method: 'POST' })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('Scraping started in the background! Please check your terminal for live progress.');
                    } else {
                        alert('Notice: ' + data.message);
                    }
                })
                .catch(err => console.error("Error starting scraper:", err));
        });

        document.getElementById('stopScrapeBtn').addEventListener('click', () => {
            fetch('/api/stop_scrape', { method: 'POST' })
                .then(res => res.json())
                .then(data => alert(data.message))
                .catch(err => console.error("Error stopping scraper:", err));
        });

        // Fetch jobs from Jobs.json
        fetch('Jobs.json')
            .then(response => response.json())
            .then(data => {
                allJobs = data;
                filterJobs();
            })
            .catch(error => console.error('Error loading jobs:', error));

        function renderJobs(jobsToRender) {
            const grid = document.getElementById('jobGrid');
            const count = document.getElementById('jobCount');

            grid.innerHTML = '';
            count.innerText = jobsToRender.length;

            jobsToRender.forEach(job => {
                const card = document.createElement('div');
                card.className = 'job-card';

                // Create Connect Buttons
                let emailButtons = '';
                if (job.emails_found && job.emails_found.length > 0) {
                    job.emails_found.forEach(email => {
                        emailButtons += `<a href="mailto:${email}?subject=Regarding ${encodeURIComponent(job.job_title)} role" class="btn-connect">
                            &#9993; Connect
                        </a>`;
                    });
                }

                card.innerHTML = `
                    <div class="job-meta">
                        <span class="badge">${job.search_role}</span>
                        <span>${job.date_posted_est || 'Unknown Date'}</span>
                    </div>
                    <h3 class="job-title">${job.job_title}</h3>
                    <div class="job-desc">${job.job_description}</div>
                    <div class="job-actions">
                        ${emailButtons}
                        <a href="${job.job_url}" target="_blank" class="btn-link">View on Dice &rarr;</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterJobs() {
            const searchInput = document.getElementById('keywordSearch').value.toLowerCase();

            if (!searchInput.trim()) {
                renderJobs(allJobs);
                return;
            }

            // Split by comma and clean up whitespace
            const keywords = searchInput.split(',').map(k => k.trim()).filter(k => k.length > 0);

            const filtered = allJobs.filter(job => {
                const searchArea = `${job.job_title} ${job.job_description}`.toLowerCase();
                // Check if the job contains ALL of the keywords
                return keywords.every(keyword => searchArea.includes(keyword));
            });

            renderJobs(filtered);
        }
    </script>
</body>

</html>
